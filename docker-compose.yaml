services:
  db:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  app:
    build:
      context: ./
    environment: 
      - DB_HOST=db
    env_file:
      - .env
    ports:
    - "${APP_PORT}:${APP_PORT}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: